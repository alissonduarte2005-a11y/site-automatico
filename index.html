<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Mapa de Praças</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #busca {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      width: 250px;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<input type="text" id="busca" placeholder="Buscar praça...">
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ======================
// MAPA
// ======================
var map = L.map('map').setView([-3.8, -40.3], 12);

// ======================
// BASE MAPS
// ======================
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

var satelite = L.tileLayer(
  'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// ======================
// WMS (GeoServer)
// ======================
var pracas = L.tileLayer.wms(
  "https://derangeable-ameer-chronoscopically.ngrok-free.dev/geoserver/AMA/wms",
  {
    layers: "AMA:vw_pracas",
    styles: "estilo-pracas",
    format: "image/png",
    transparent: true,
    version: "1.1.1"
  }
);

// ======================
// ADICIONAR AO MAPA
// ======================
osm.addTo(map);
pracas.addTo(map);

// ======================
// CONTROLE DE CAMADAS
// ======================
var baseMaps = {
  "Mapa": osm,
  "Satélite": satelite
};

var overlayMaps = {
  "Praças": pracas
};

L.control.layers(baseMaps, overlayMaps).addTo(map);

// ======================
// WFS (POPUP + CLIQUE)
// ======================
fetch("https://derangeable-ameer-chronoscopically.ngrok-free.dev/geoserver/AMA/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=AMA:vw_pracas&outputFormat=application/json")
.then(res => res.json())
.then(data => {

  var geojsonLayer = L.geoJSON(data, {

    // IMPORTANTE: precisa ser clicável
    interactive: true,

    style: function () {
      return {
        color: "#000000",
        weight: 1,
        fillOpacity: 0
      };
    },

    onEachFeature: function (feature, layer) {

      var nome = feature.properties.nome || "Sem nome";
      var nome_popul = feature.properties.nome_popul || "Não informado";
      var resposavel = feature.properties.resposavel || "Não informado";

      layer.bindPopup(`
        <div style="font-family: Arial; min-width: 200px;">
          <h3 style="margin:0; color:#2c3e50;">${nome}</h3>
          <p><b>Nome popular:</b><br>${nome_popul}</p>
          <p><b>Responsável:</b><br>${resposavel}</p>
        </div>
      `);

    }

  }).addTo(map);

  map.fitBounds(geojsonLayer.getBounds());

  window.pracasLayer = geojsonLayer;

});

// ======================
// BUSCA (CORRIGIDA)
// ======================
document.getElementById("busca").addEventListener("keyup", function () {

  var texto = this.value.toLowerCase().trim();

  if (!window.pracasLayer) return;

  var encontrou = false;

  window.pracasLayer.eachLayer(function (layer) {

    var props = layer.feature.properties;

    var nome = (props.nome || "").toLowerCase();
    var nome_popul = (props.nome_popul || "").toLowerCase();

    // reset
    layer.setStyle({
      color: "#000000",
      weight: 1,
      fillOpacity: 0
    });

    if (texto !== "" && (nome.includes(texto) || nome_popul.includes(texto))) {

      encontrou = true;

      layer.setStyle({
        color: "red",
        weight: 3,
        fillColor: "yellow",
        fillOpacity: 0.5
      });

      map.fitBounds(layer.getBounds());
      layer.openPopup();
    }

  });

  if (texto === "") {
    map.setView([-3.8, -40.3], 12);
  }

});

// ======================
// LEGENDA
// ======================
var legenda = L.control({position: 'bottomright'});

legenda.onAdd = function () {
  var div = L.DomUtil.create('div', 'legend');

  div.innerHTML = `
    <b>Legenda</b><br>
    <img src="https://derangeable-ameer-chronoscopically.ngrok-free.dev/geoserver/AMA/wms?REQUEST=GetLegendGraphic&FORMAT=image/png&LAYER=AMA:vw_pracas&STYLE=estilo-pracas">
  `;

  return div;
};

legenda.addTo(map);

</script>

</body>
</html>
