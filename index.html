<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Mapa de Praças</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #busca {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      width: 250px;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<input type="text" id="busca" placeholder="Buscar praça...">
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAPA
var map = L.map('map').setView([-3.8, -40.3], 12);

// BASE
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var satelite = L.tileLayer(
  'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// WMS
var wmsLayer = L.tileLayer.wms(
  "https://derangeable-ameer-chronoscopically.ngrok-free.dev/geoserver/AMA/wms",
  {
    layers: "AMA:vw_pracas",
    styles: "estilo-pracas",
    format: "image/png",
    transparent: true
  }
).addTo(map);

// CONTROLE
L.control.layers(
  { "Mapa": osm, "Satélite": satelite },
  { "Praças": wmsLayer }
).addTo(map);

// ======================
// POPUP VIA WMS (SEM WFS)
// ======================
map.on("click", function(e){

  var url = "https://derangeable-ameer-chronoscopically.ngrok-free.dev/geoserver/AMA/wms?" +
    "service=WMS&version=1.1.1&request=GetFeatureInfo" +
    "&layers=AMA:vw_pracas" +
    "&query_layers=AMA:vw_pracas" +
    "&info_format=application/json" +
    "&srs=EPSG:4326" +
    "&bbox=" + map.getBounds().toBBoxString() +
    "&width=" + map.getSize().x +
    "&height=" + map.getSize().y +
    "&x=" + Math.floor(e.containerPoint.x) +
    "&y=" + Math.floor(e.containerPoint.y);

  fetch(url)
  .then(res => res.json())
  .then(data => {

    if (data.features.length > 0) {

      var props = data.features[0].properties;

      var nome = props.nome || "Sem nome";
      var nome_popul = props.nome_popul || "Não informado";
      var resposavel = props.resposavel || "Não informado";

      L.popup()
        .setLatLng(e.latlng)
        .setContent(`
          <b>${nome}</b><br>
          Nome popular: ${nome_popul}<br>
          Responsável: ${resposavel}
        `)
        .openOn(map);

    }

  });

});

// ======================
// BUSCA SIMPLES (zoom manual)
// ======================
document.getElementById("busca").addEventListener("keypress", function(e){

  if (e.key === "Enter") {

    alert("Use o clique no mapa para identificar a praça.\n\n(A busca avançada precisa do WFS com CORS liberado)");

  }

});

// LEGENDA
var legenda = L.control({position: 'bottomright'});

legenda.onAdd = function () {
  var div = L.DomUtil.create('div', 'legend');

  div.innerHTML = `
    <b>Legenda</b><br>
    <img src="https://derangeable-ameer-chronoscopically.ngrok-free.dev/geoserver/AMA/wms?REQUEST=GetLegendGraphic&FORMAT=image/png&LAYER=AMA:vw_pracas&STYLE=estilo-pracas">
  `;

  return div;
};

legenda.addTo(map);

</script>

</body>
</html>
