<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Mapa de Praças</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    /* Popup */
    .popup {
      font-family: Arial;
      min-width: 180px;
    }

    .popup h3 {
      margin: 0;
      color: #2c3e50;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }

    .popup p {
      margin: 8px 0;
    }

    /* Legenda */
    .legend {
      position: absolute;
      bottom: 20px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ======================
// MAPA
// ======================
var map = L.map('map').setView([-3.8, -40.3], 12);

// ======================
// BASE MAPS
// ======================

// OpenStreetMap
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
});

// Satélite
var satelite = L.tileLayer(
  'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Esri' }
);

// ======================
// WMS (GeoServer - cores)
// ======================
var pracas = L.tileLayer.wms("http://172.31.2.42:8080/geoserver/AMA/wms", {
  layers: "AMA:vw_pracas",
  styles: "estilo-pracas",
  format: "image/png",
  transparent: true
});

// ======================
// ADICIONAR AO MAPA
// ======================
osm.addTo(map);
pracas.addTo(map);

// ======================
// CONTROLE DE CAMADAS
// ======================
var baseMaps = {
  "Mapa": osm,
  "Satélite": satelite
};

var overlayMaps = {
  "Praças": pracas
};

L.control.layers(baseMaps, overlayMaps).addTo(map);

// ======================
// WFS (POPUP)
// ======================
fetch("http://172.31.2.42:8080/geoserver/AMA/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=AMA:vw_pracas&outputFormat=application/json")
.then(response => response.json())
.then(data => {

  var geojson = L.geoJSON(data, {

    onEachFeature: function (feature, layer) {

      var nome = feature.properties.nome || "Sem nome";
      var nome_popul = feature.properties.nome_popul || "Não informado";

      layer.bindPopup(`
        <div class="popup">
          <h3>${nome}</h3>
          <p><b>Nome popular:</b><br>${nome_popul}</p>
        </div>
      `);

    }

  });

  geojson.addTo(map);

  // Zoom automático
  map.fitBounds(geojson.getBounds());

});

// ======================
// LEGENDA AUTOMÁTICA
// ======================
var legenda = L.control({position: 'bottomright'});

legenda.onAdd = function () {
  var div = L.DomUtil.create('div', 'legend');

  div.innerHTML = `
    <b>Legenda</b><br>
    <img src="http://172.31.2.42:8080/geoserver/AMA/wms?REQUEST=GetLegendGraphic&FORMAT=image/png&LAYER=AMA:vw_pracas&STYLE=estilo-pracas">
  `;

  return div;
};

legenda.addTo(map);

</script>

</body>
</html>
